<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impossible Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:Arial;
    user-select:none;
    transition:0.08s;
}

h1{
    text-align:center;
    margin-top:15px;
    font-size:60px;
    text-shadow:0 0 20px red;
}

#info{
    text-align:center;
    font-size:24px;
}

#fails{
    text-align:center;
    color:red;
    font-size:30px;
    margin-top:10px;
}

#game{
    width:100vw;
    height:85vh;
    position:relative;
    overflow:hidden;
}

#btn{
    position:absolute;
    padding:20px 40px;
    border:none;
    border-radius:20px;
    background:lime;
    color:black;
    font-size:32px;
    cursor:pointer;
    box-shadow:0 0 30px lime;
    z-index:10;
}

.clone{
    position:absolute;
    padding:20px 40px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
    font-size:30px;
    cursor:pointer;
}

.popup{
    position:absolute;
    background:white;
    color:black;
    padding:12px;
    border-radius:10px;
    font-size:20px;
    z-index:999;
}

#jumpscare{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:10000;
}

#jumpscare img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#laugh{
    position:absolute;
    color:red;
    font-size:120px;
    animation:shake 0.05s infinite;
}

#victory{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
}

#victory h2{
    color:lime;
    font-size:110px;
}

#holdBar{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:400px;
    height:35px;
    border:3px solid white;
    display:none;
}

#holdFill{
    width:0%;
    height:100%;
    background:lime;
}

#blackout{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    z-index:5000;
}

.obstacle{
    position:absolute;
    width:120px;
    height:120px;
    background:red;
    border-radius:50%;
    animation:spin 2s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes shake{
    0%{transform:translate(5px,5px);}
    25%{transform:translate(-5px,-5px);}
    50%{transform:translate(5px,-5px);}
    75%{transform:translate(-5px,5px);}
    100%{transform:translate(5px,5px);}
}

.flash{
    background:white !important;
}

</style>
</head>

<body>

<h1>THE WORLD'S EASIEST GAME</h1>

<div id="info">
    Just click the green button once.
</div>

<div id="fails">Fails: 0</div>

<div id="game">
    <button id="btn">CLICK ME</button>
</div>

<div id="holdBar">
    <div id="holdFill"></div>
</div>

<div id="blackout"></div>

<div id="jumpscare">
    <img src="https://i.imgur.com/8Q2QK0G.jpeg">
    <div id="laugh">HAHAHAHA</div>
</div>

<div id="victory">
    <h2>YOU WIN.</h2>
    <p>You wasted your life successfully.</p>
</div>

<audio id="scream">
    <source src="https://www.myinstants.com/media/sounds/movie_1.mp3">
</audio>

<script>

const btn = document.getElementById("btn");
const failsText = document.getElementById("fails");
const jumpscare = document.getElementById("jumpscare");
const scream = document.getElementById("scream");
const holdBar = document.getElementById("holdBar");
const holdFill = document.getElementById("holdFill");
const victory = document.getElementById("victory");
const blackout = document.getElementById("blackout");

let fails = 0;
let canWin = false;
let reverseMode = false;
let holdAmount = 0;
let holding = false;

moveBtn();


// BUTTON RUNS
document.addEventListener("mousemove",(e)=>{

    if(canWin) return;

    const rect = btn.getBoundingClientRect();

    const bx = rect.left + rect.width/2;
    const by = rect.top + rect.height/2;

    const dx = e.clientX - bx;
    const dy = e.clientY - by;

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 180){

        moveBtn();

        fail();

    }

});


// CLICK
let lastClick = 0;

btn.addEventListener("click",()=>{

    let now = Date.now();

    if(now - lastClick < 20){

        explodeCheater();

        return;

    }

    lastClick = now;

    // FAKE WINS
    if(!canWin){

        fakeWin();

    }

});


// HOLD TO WIN
btn.addEventListener("mousedown",()=>{

    if(!canWin) return;

    holding = true;

});

document.addEventListener("mouseup",()=>{

    holding = false;

});


setInterval(()=>{

    if(canWin && holding){

        holdAmount += 2;

        holdFill.style.width = holdAmount + "%";

        // BUTTON STILL MOVES WHILE HOLDING
        moveBtn();

        if(holdAmount >= 100){

            victory.style.display = "flex";

        }

    }
    else{

        holdAmount -= 4;

        if(holdAmount < 0) holdAmount = 0;

        holdFill.style.width = holdAmount + "%";

    }

},100);


// FAIL
function fail(){

    fails++;

    failsText.innerText = "Fails: " + fails;

    // SHRINK BUTTON
    let size = parseFloat(getComputedStyle(btn).fontSize);

    if(size > 8){

        btn.style.fontSize = (size - 0.4) + "px";

    }

    // RANDOM FLASH
    if(Math.random() < 0.3){

        document.body.classList.add("flash");

        setTimeout(()=>{
            document.body.classList.remove("flash");
        },100);

    }

    // BLACKOUT
    if(Math.random() < 0.08){

        blackout.style.display = "block";

        setTimeout(()=>{
            blackout.style.display = "none";
        },1000);

    }

    // CURSOR DISAPPEARS
    if(fails > 30){

        document.body.style.cursor = "none";

    }

    // REVERSE MODE
    if(fails === 40){

        reverseMode = true;

        popup("MOUSE CONTROLS REVERSED");

    }

    // SPAWN FAKE BUTTONS
    if(fails === 50){

        for(let i=0;i<8;i++){

            spawnClone();

        }

    }

    // MOVING OBSTACLES
    if(fails === 65){

        for(let i=0;i<5;i++){

            createObstacle();

        }

    }

    // REAL WIN PHASE
    if(fails >= 100){

        canWin = true;

        btn.innerText = "HOLD TO WIN";

        btn.style.fontSize = "40px";

        btn.style.opacity = "1";

        holdBar.style.display = "block";

        popup("Okay. Final phase.");

    }

}


// MOVE BUTTON
function moveBtn(){

    let x = Math.random() * (window.innerWidth - 250);
    let y = Math.random() * (window.innerHeight - 250);

    if(reverseMode){

        x = window.innerWidth - x - 200;
        y = window.innerHeight - y - 100;

    }

    btn.style.left = x + "px";
    btn.style.top = y + "px";

}


// POPUPS
function popup(text){

    const p = document.createElement("div");

    p.className = "popup";

    p.innerText = text;

    p.style.left =
    Math.random() * (window.innerWidth - 300) + "px";

    p.style.top =
    Math.random() * (window.innerHeight - 200) + "px";

    document.body.appendChild(p);

    setTimeout(()=>{
        p.remove();
    },2000);

}


// JUMPSCARE
function fakeWin(){

    jumpscare.style.display = "flex";

    scream.play();

    document.body.style.animation = "shake 0.04s infinite";

    setTimeout(()=>{

        jumpscare.style.display = "none";

        document.body.style.animation = "none";

        popup("NOPE 😂");

        moveBtn();

    },2500);

}


// CLONES
function spawnClone(){

    const clone = document.createElement("button");

    clone.className = "clone";

    clone.innerText = "CLICK ME";

    clone.style.left =
    Math.random() * (window.innerWidth - 300) + "px";

    clone.style.top =
    Math.random() * (window.innerHeight - 200) + "px";

    clone.onclick = ()=>{

        alert("WRONG BUTTON 💀");

        fail();

    };

    document.body.appendChild(clone);

}


// CHEATER DETECTION
function explodeCheater(){

    for(let i=0;i<30;i++){

        popup("CHEATER");

    }

    alert("AUTOCLICKER DETECTED 🤖");

}


// OBSTACLES
function createObstacle(){

    const obs = document.createElement("div");

    obs.className = "obstacle";

    obs.style.left =
    Math.random() * (window.innerWidth - 150) + "px";

    obs.style.top =
    Math.random() * (window.innerHeight - 150) + "px";

    document.body.appendChild(obs);

    let dx = Math.random()*8-4;
    let dy = Math.random()*8-4;

    setInterval(()=>{

        let x = obs.offsetLeft + dx;
        let y = obs.offsetTop + dy;

        if(x < 0 || x > window.innerWidth-120) dx *= -1;
        if(y < 0 || y > window.innerHeight-120) dy *= -1;

        obs.style.left = x + "px";
        obs.style.top = y + "px";

    },30);

}


// RANDOM TROLLS
setInterval(()=>{

    if(!canWin){

        const msgs = [

            "You almost had it.",
            "Skill issue.",
            "The button fears you.",
            "Bro is LOCKED IN 💀",
            "Even grandma clicks faster."

        ];

        if(Math.random() < 0.4){

            alert(msgs[Math.floor(Math.random()*msgs.length)]);

        }

    }

},14000);

</script>

</body>
</html>
