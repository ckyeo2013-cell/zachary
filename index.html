<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Minecraft</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

#crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    margin-left: -5px;
    margin-top: -5px;
    color: white;
    font-size: 20px;
    font-family: Arial;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const blocks = [];

function createBlock(x, y, z, color=0x55aa55) {
    const geometry = new THREE.BoxGeometry(1,1,1);
    const material = new THREE.MeshLambertMaterial({color});
    const cube = new THREE.Mesh(geometry, material);

    cube.position.set(x,y,z);

    scene.add(cube);
    blocks.push(cube);

    return cube;
}

for(let x=-10; x<=10; x++) {
    for(let z=-10; z<=10; z++) {
        createBlock(x,0,z,0x55aa55);

        if(Math.random() > 0.8){
            createBlock(x,1,z,0x228822);
        }
    }
}

camera.position.set(0,3,5);

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

let pitch = 0;
let yaw = 0;

document.body.addEventListener("click", ()=>{
    document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
    if(document.pointerLockElement === document.body){

        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;

        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));

        camera.rotation.order = "YXZ";
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;
    }
});

const raycaster = new THREE.Raycaster();

document.addEventListener("mousedown", e=>{

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

    const intersects = raycaster.intersectObjects(blocks);

    if(intersects.length > 0){

        const hit = intersects[0];

        if(e.button === 0){

            scene.remove(hit.object);

            const index = blocks.indexOf(hit.object);

            if(index > -1){
                blocks.splice(index,1);
            }

        } else if(e.button === 2){

            const normal = hit.face.normal;

            const pos = hit.object.position.clone().add(normal);

            createBlock(pos.x,pos.y,pos.z,0x996633);
        }
    }
});

document.addEventListener("contextmenu", e=>e.preventDefault());

let velocityY = 0;
let onGround = false;

function animate(){

    requestAnimationFrame(animate);

    const speed = 0.1;

    const forward = new THREE.Vector3(
        Math.sin(yaw),
        0,
        Math.cos(yaw)
    );

    const right = new THREE.Vector3(
        Math.cos(yaw),
        0,
        -Math.sin(yaw)
    );

    if(keys["w"]){
        camera.position.add(forward.clone().multiplyScalar(-speed));
    }

    if(keys["s"]){
        camera.position.add(forward.clone().multiplyScalar(speed));
    }

    if(keys["a"]){
        camera.position.add(right.clone().multiplyScalar(-speed));
    }

    if(keys["d"]){
        camera.position.add(right.clone().multiplyScalar(speed));
    }

    velocityY -= 0.01;
    camera.position.y += velocityY;

    if(camera.position.y < 2){
        camera.position.y = 2;
        velocityY = 0;
        onGround = true;
    }

    if(keys[" "] && onGround){
        velocityY = 0.2;
        onGround = false;
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", ()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
