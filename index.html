<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totally Easy Game</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: black;
        color: white;
        user-select: none;
        cursor: crosshair;
    }

    h1 {
        text-align: center;
        margin-top: 20px;
        font-size: 50px;
    }

    #instruction {
        text-align: center;
        font-size: 22px;
    }

    #fails {
        text-align: center;
        margin-top: 10px;
        font-size: 25px;
        color: red;
    }

    #gameArea {
        width: 100vw;
        height: 85vh;
        position: relative;
    }

    #button {
        position: absolute;
        padding: 20px 40px;
        font-size: 28px;
        border: none;
        border-radius: 15px;
        background: lime;
        color: black;
        cursor: pointer;
        transition: 0.05s;
        box-shadow: 0 0 20px lime;
    }

    #fakeWin {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 80px;
        color: lime;
        display: none;
    }

    #jumpscare {
        position: fixed;
        inset: 0;
        background: black;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        flex-direction: column;
    }

    #jumpscare img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #laughText {
        position: absolute;
        color: red;
        font-size: 100px;
        font-weight: bold;
        text-shadow: 0 0 20px red;
        animation: shake 0.1s infinite;
    }

    @keyframes shake {
        0% { transform: translate(5px, 5px); }
        25% { transform: translate(-5px, -5px); }
        50% { transform: translate(5px, -5px); }
        75% { transform: translate(-5px, 5px); }
        100% { transform: translate(5px, 5px); }
    }

    .popup {
        position: absolute;
        background: white;
        color: black;
        padding: 15px;
        border: 3px solid black;
        border-radius: 10px;
        font-size: 20px;
        z-index: 5;
    }

</style>
</head>

<body>

<h1>SUPER EASY GAME</h1>
<div id="instruction">
    Just click the green button ONE time.
</div>

<div id="fails">Fails: 0</div>

<div id="gameArea">
    <button id="button">CLICK ME</button>
    <div id="fakeWin">YOU DID IT!</div>
</div>

<div id="jumpscare">
    <img src="https://i.imgur.com/8Q2QK0G.jpeg">
    <div id="laughText">HAHAHAHA</div>
</div>

<audio id="scream">
    <source src="https://www.myinstants.com/media/sounds/movie_1.mp3" type="audio/mp3">
</audio>

<script>

const button = document.getElementById("button");
const gameArea = document.getElementById("gameArea");
const fakeWin = document.getElementById("fakeWin");
const failsText = document.getElementById("fails");
const jumpscare = document.getElementById("jumpscare");
const scream = document.getElementById("scream");

let fails = 0;
let impossibleMode = false;

moveButton();

// BUTTON RUNS AWAY
document.addEventListener("mousemove", (e) => {

    const rect = button.getBoundingClientRect();

    const bx = rect.left + rect.width / 2;
    const by = rect.top + rect.height / 2;

    const dx = e.clientX - bx;
    const dy = e.clientY - by;

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 150) {
        moveButton();
        fail();
    }
});

// IF BUTTON CLICKED
button.addEventListener("click", () => {

    fakeWin.style.display = "block";

    setTimeout(() => {
        fakeWin.style.display = "none";

        jumpscare.style.display = "flex";
        scream.play();

        // SHAKE SCREEN
        document.body.style.animation = "shake 0.1s infinite";

        setTimeout(() => {
            alert("YOU REALLY THOUGHT YOU WON 💀");
            location.reload();
        }, 3000);

    }, 500);
});

function moveButton() {

    const x = Math.random() * (window.innerWidth - 250);
    const y = Math.random() * (window.innerHeight - 250);

    button.style.left = x + "px";
    button.style.top = y + "px";
}

// FAIL SYSTEM
function fail() {

    fails++;
    failsText.innerText = "Fails: " + fails;

    // BUTTON SHRINKS
    let currentSize = parseFloat(window.getComputedStyle(button).fontSize);

    if (currentSize > 8) {
        button.style.fontSize = (currentSize - 0.5) + "px";
    }

    // RANDOM FAKE ERROR POPUPS
    if (fails % 7 === 0) {
        createPopup("Skill issue detected.");
    }

    if (fails % 13 === 0) {
        createPopup("Mouse calibration failed.");
    }

    if (fails % 20 === 0) {
        createPopup("Button escaped.");
    }

    // SCREEN FLIPS
    if (fails === 25) {
        document.body.style.transform = "rotate(180deg)";
    }

    // INVISIBLE BUTTON
    if (fails === 35) {
        button.style.opacity = "0.2";
    }

    // BUTTON TELEPORT SPAM
    if (fails === 45 && !impossibleMode) {

        impossibleMode = true;

        setInterval(() => {
            moveButton();
        }, 120);
    }

    // FAKE VIRUS MODE
    if (fails === 60) {

        for (let i = 0; i < 20; i++) {
            createPopup("VIRUS DETECTED");
        }
    }
}

// RANDOM POPUPS
function createPopup(text) {

    const popup = document.createElement("div");

    popup.classList.add("popup");
    popup.innerText = text;

    popup.style.left = Math.random() * (window.innerWidth - 200) + "px";
    popup.style.top = Math.random() * (window.innerHeight - 100) + "px";

    document.body.appendChild(popup);

    setTimeout(() => {
        popup.remove();
    }, 2000);
}

// RANDOM TROLL ALERTS
setInterval(() => {

    const messages = [
        "You almost had it.",
        "That was embarrassing.",
        "Even a grandma clicks faster.",
        "Button says no.",
        "Try harder.",
        "Bro is struggling 💀"
    ];

    const msg = messages[Math.floor(Math.random() * messages.length)];

    if (Math.random() < 0.4) {
        alert(msg);
    }

}, 12000);

// WINDOW RESIZE TROLL
window.addEventListener("resize", () => {
    moveButton();
    alert("Nice try resizing.");
});

</script>

</body>
</html>
